name: Build Flutter AI APK

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [build-event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ১. রিপোজিটরি চেকআউট
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা সেটআপ (JDK 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. ফ্লাটার সেটআপ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ৪. এআই কোড ইনজেকশন (Llama/Hugging Face Script)
      - name: AI Code Injection
        run: |
          if [ -f builder_script.py ]; then
            python3 builder_script.py "${{ github.event.client_payload.prompt }}" "${{ github.event.client_payload.asset_name }}"
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # ৫. অ্যান্ড্রয়েড ফাইল ও গ্র্যাডল কনফিগারেশন (৮.১৩)
      - name: Generate Essential Android Files
        run: |
          rm -rf android
          NEW_PKG="${{ github.event.client_payload.package_name }}"
          if [ -z "$NEW_PKG" ]; then NEW_PKG="com.wasim.ai_bd"; fi
          
          flutter create . --platforms android --org ${NEW_PKG%.*}
          
          mkdir -p android/gradle/wrapper
          cat <<EOT > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-all.zip
          EOT
          
          cat <<EOT > android/gradle.properties
          org.gradle.jvmargs=-Xmx4G
          android.useAndroidX=true
          android.enableJetifier=true
          android.newDsl=false
          android.suppressBuildResourcesInAppChecks=true
          EOT
          
          flutter clean
          flutter pub get
          chmod +x android/gradlew

      # ৬. কীস্টোর ডিকোড (Signing)
      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # ৭. ফাইনাল APK বিল্ড (Release)
      - name: Build APK (Release)
        run: |
          flutter build apk --release \
          --split-per-abi \
          --target-platform android-arm64 \
          --no-pub \
          --android-skip-build-dependency-validation
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      # ৮. APK আপলোড করা
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generated-AI-APK
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          
