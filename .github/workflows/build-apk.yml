name: AI APK Builder Engine

on: 
  push
    branches:
        - main
  repository_dispatch:
    types: [build-event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ১. রিপোজিটরি ফাইলগুলো নিয়ে আসা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা সেটআপ করা (JDK 17 Stable)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. ফ্লাটার সেটআপ করা
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # ৪. পাইথন লাইব্রেরি ইনস্টল করা
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

       # ৫. প্যাকেজ নাম এবং SDK ডাইনামিকালি পরিবর্তন
      - name: Update Package and SDK
        run: |
          NEW_PKG="${{ github.event.client_payload.package_name }}"
          if [ -z "$NEW_PKG" ]; then NEW_PKG="com.wasim.ai_bd"; fi
          
          TARGET_SDK="${{ github.event.client_payload.target_sdk }}"
          if [ -z "$TARGET_SDK" ]; then TARGET_SDK="35"; fi
          
          echo "Updating to Package: $NEW_PKG and SDK: $TARGET_SDK"
          
          # build.gradle ফাইলের লাইনগুলো সঠিকভাবে আপডেট করার জন্য
          sed -i "s/def targetSdkVersion = [0-9]*/def targetSdkVersion = $TARGET_SDK/g" android/app/build.gradle
          sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion $TARGET_SDK/g" android/app/build.gradle
          sed -i "s/applicationId \".*\"/applicationId \"$NEW_PKG\"/g" android/app/build.gradle


      # ৬. অ্যাসেটস অটো-রেজিস্ট্রেশন
      - name: Register Assets
        run: |
          mkdir -p assets
          if ! grep -q "assets:" pubspec.yaml; then
            echo "  assets:" >> pubspec.yaml
            echo "    - assets/" >> pubspec.yaml
          fi

      # ৭. AI কোড ইনজেকশন (Gemini Python Script)
      - name: AI Code Injection
        run: |
          if [ -f builder_script.py ]; then
            python3 builder_script.py "${{ github.event.client_payload.prompt }}" "${{ github.event.client_payload.asset_name }}"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

                  # ৮. গ্র্যাডল ফাইল জেনারেট এবং ডিপেন্ডেন্সি ইনস্টল
      - name: Install Dependencies
        run: |
          # গ্র্যাডল এবং প্রজেক্ট স্ট্রাকচার ঠিক করা
          flutter create . --platforms android
          flutter clean
          flutter pub get
          # পারমিশন ফিক্স
          chmod +x android/gradlew
          
          

      # ৯. Base64 থেকে JKS ফাইল জেনারেট করা (Path নিশ্চিত করা হয়েছে)
      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      #      # ১০. ফাইনাল APK বিল্ড (ভার্সন চেক স্কিপ করে)
      - name: Build APK (Release)
        run: |
          flutter build apk --release \
          --split-per-abi \
          --target-platform android-arm64 \
          --android-skip-build-dependency-validation
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      # ১১. তৈরি হওয়া APK ফাইলটি আপলোড করা
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generated-AI-APK
          path: build/app/outputs/flutter-apk/app-release-arm64-v8a.apk
