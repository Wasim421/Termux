name: Build Flutter AI APK

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [build-event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ১. রিপোজিটরি কোড ডাউনলোড করা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা এনভায়রনমেন্ট সেটআপ (JDK 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. ফ্লাটার এসডিকে সেটআপ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ৪. পাইথন লাইব্রেরি ইনস্টল (Pillow, Requests এবং Hub Client)
      # এটি নতুন মার্জড builder_script.py-এর জন্য বাধ্যতামূলক
      - name: Install Python Dependencies
        run: pip install Pillow requests huggingface_hub

      # ৫. এআই কোড ইনজেকশন (Merged Script Engine)
      - name: AI Code Injection
        run: |
          if [ -f builder_script.py ]; then
            PROMPT="${{ github.event.client_payload.prompt }}"
            ASSET="${{ github.event.client_payload.asset_name }}"
            
            # ডিফল্ট ভ্যালু সেট করা যাতে ইনপুট না থাকলেও বিল্ড না থামে
            if [ -z "$PROMPT" ]; then PROMPT="GAI Reader Pro Modern UI Design"; fi
            if [ -z "$ASSET" ]; then ASSET="background.png"; fi
            
            python3 builder_script.py "$PROMPT" "$ASSET"
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # ৬. অ্যান্ড্রয়েড প্রোজেক্ট এবং গ্র্যাডল ৮.১৩ কনফিগারেশন
      - name: Generate Essential Android Files
        run: |
          rm -rf android
          NEW_PKG="${{ github.event.client_payload.package_name }}"
          if [ -z "$NEW_PKG" ]; then NEW_PKG="com.wasim.ai_bd"; fi
          
          flutter create . --platforms android --org ${NEW_PKG%.*}
          
          # গ্র্যাডল র্যাপার আপডেট (Version 8.13)
          mkdir -p android/gradle/wrapper
          cat <<EOT > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-all.zip
          EOT
          
          # গ্র্যাডল প্রোপার্টিজ (৪জিবি র‍্যাম বরাদ্দ)
          cat <<EOT > android/gradle.properties
          org.gradle.jvmargs=-Xmx4G
          android.useAndroidX=true
          android.enableJetifier=true
          android.newDsl=false
          android.suppressBuildResourcesInAppChecks=true
          EOT
          
          flutter clean
          flutter pub get
          chmod +x android/gradlew

      # ৭. কীস্টোর সেটআপ (অ্যাপ সাইনিং)
      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # ৮. রিলিজ APK বিল্ড (arm64-v8a অপ্টিমাইজড)
      - name: Build APK (Release)
        run: |
          flutter build apk --release \
          --split-per-abi \
          --target-platform android-arm64 \
          --no-pub \
          --android-skip-build-dependency-validation
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      # ৯. তৈরি হওয়া APK ফাইলটি গিটহাবে আপলোড করা
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generated-AI-APK
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          
