name: AI App Builder Engine
on:
  repository_dispatch:
    types: [build_app] # এটি AI থেকে সিগন্যাল পেলে কাজ শুরু করবে

jobs:
  generate_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Template
        uses: actions/checkout@v4

      - name: Inject AI Generated Code
        run: |
          echo "${{ github.event.client_payload.ui_code }}" > app/src/main/res/layout/activity_main.xml
          # এখানে AI থেকে আসা কোডটি রিপ্লেস হবে

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-AI-App
          path: app/build/outputs/apk/debug/*.apk
